services:
  - type: web
    name: ai-call-analytics-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn hosted_mcp_server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        value: call_analytics_db
      - key: MYSQL_PORT
        value: "3306"
      - key: MCP_AUTH_TOKEN
        sync: false
      - key: ENVIRONMENT
        value: production
